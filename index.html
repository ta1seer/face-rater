<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Rater - Vintage Face Analyzer</title>
    <!-- Tailwind CSS 4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Face-api.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            --color-gold: #C29958;
            --color-dark: #12100E;
            --color-dark-alt: #1A1614;
            --color-cream: #E6D5B8;
            --font-serif: "Georgia", serif;
            --font-mono: "Courier Prime", "Courier New", Courier, monospace;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-cream);
            font-family: var(--font-serif);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vintage-border {
            border: 8px double var(--color-gold);
            border-radius: 20px;
            outline: 2px solid var(--color-dark);
            outline-offset: -5px;
        }

        .paper-texture {
            background-color: var(--color-dark-alt);
            background-image: radial-gradient(#26221F 1px, transparent 0);
            background-size: 24px 24px;
        }

        .distressed-box {
            border: 1px dashed rgba(194, 153, 88, 0.4);
            border-radius: 20px;
            position: relative;
            transition: border-color 0.2s;
        }

        .distressed-box:hover {
            border-color: var(--color-gold);
        }

        .btn-vintage {
            background-color: var(--color-gold);
            color: var(--color-dark);
            font-family: var(--font-mono);
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 2px solid var(--color-dark);
            box-shadow: 4px 4px 0px #4A3B22;
            border-radius: 20px;
        }

        .btn-vintage:hover:not(:disabled) {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px #4A3B22;
        }

        .btn-vintage:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .badge-stamp {
            transform: rotate(-5deg);
            border: 3px double var(--color-gold);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            color: var(--color-gold);
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            background: rgba(194, 153, 88, 0.05);
            animation: stampFadeIn 0.5s ease-out forwards;
        }

        @keyframes stampFadeIn {
            from { opacity: 0; transform: rotate(-10deg) scale(1.2); }
            to { opacity: 1; transform: rotate(-5deg) scale(1.0); }
        }

        .status-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4CAF50;
            box-shadow: 0 0 5px #4CAF50;
        }

        .status-led.waiting {
            background-color: #f4b400;
            box-shadow: 0 0 5px #f4b400;
        }

        .loader {
            border: 2px solid rgba(194, 153, 88, 0.2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border-left-color: var(--color-gold);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-dark); }
        ::-webkit-scrollbar-thumb { background: var(--color-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="w-full max-w-[920px] lg:h-[700px] vintage-border paper-texture p-6 md:p-10 flex flex-col relative overflow-hidden m-4">
        <!-- Header -->
        <header class="text-center mb-6 md:mb-10">
            <div class="flex items-center justify-center gap-4 mb-2">
                <div class="h-px w-16 md:w-24 bg-[#C29958] opacity-50"></div>
                <span class="text-[10px] md:text-xs tracking-[0.3em] font-mono uppercase text-[#C29958]">A Dushto-Taiseer Production</span>
                <div class="h-px w-16 md:w-24 bg-[#C29958] opacity-50"></div>
            </div>
            <h1 class="text-4xl md:text-7xl font-bold tracking-tight uppercase text-[#C29958]" style="letter-spacing: -2px">Face Rater</h1>
        </header>

        <main class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-8 items-start overflow-hidden">
            <!-- Left Side: Controls -->
            <div class="md:col-span-5 flex flex-col gap-6">
                <!-- Upload Zone -->
                <div id="upload-zone" class="distressed-box bg-black/40 h-64 md:h-80 flex flex-col items-center justify-center p-4 text-center cursor-pointer border-2 border-dashed border-[#C29958]/40 hover:border-[#C29958] transition-colors relative overflow-hidden group">
                    <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-40" accept="image/*">
                    <svg class="h-10 w-10 mb-4 opacity-40 group-hover:scale-110 transition-transform text-[#C29958]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <p class="font-mono text-xs uppercase tracking-widest text-[#C29958]">Upload Face</p>
                    <p class="text-[10px] opacity-40 mt-2 font-serif">(Gallery or Camera Capture)</p>
                </div>

                <!-- Analysis Controls -->
                <div class="p-4 bg-[#26221F] border border-[#C29958]/20 rounded-xl">
                    <div class="flex items-center gap-3 mb-4">
                        <div id="status-led" class="status-led waiting"></div>
                        <span id="status-text" class="text-[10px] font-mono uppercase tracking-tighter opacity-70">Awaiting Engine Warmup...</span>
                    </div>
                    <button id="analyze-btn" disabled class="btn-vintage w-full py-4 text-lg">
                        Begin Analysis
                    </button>
                </div>
            </div>

            <!-- Right Side: Viewport & Results -->
            <div class="md:col-span-7 h-full flex flex-col justify-between p-4 md:p-6 bg-[#12100E]/50 rounded-lg border border-[#C29958]/10 relative overflow-hidden min-h-[400px]">
                <!-- Viewport Frame -->
                <div class="relative flex-1 overflow-hidden min-h-[250px] rounded-lg">
                    <div class="absolute inset-0 border-[10px] md:border-[20px] border-black/80 z-20 pointer-events-none"></div>
                    <div class="w-full h-full bg-[#1A1614] flex items-center justify-center overflow-hidden relative">
                        <!-- Placeholder -->
                        <div id="image-placeholder" class="text-center opacity-10">
                            <svg class="w-24 h-24 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="font-mono text-xs uppercase">No Subject Selected</p>
                        </div>
                        
                        <!-- Preview Image -->
                        <img id="image-preview" src="" alt="Subject" class="w-full h-full object-cover grayscale contrast-125 opacity-80 hidden">
                        
                        <!-- Loading Overlay -->
                        <div id="loader-overlay" class="absolute inset-0 z-30 flex items-center justify-center bg-black/60 hidden">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>

                <!-- Results Output -->
                <div id="results-container" class="mt-6 flex flex-col items-center md:items-start gap-4 hidden">
                    <div id="error-badge" class="badge-stamp border-red-900/50 text-red-700 hidden">
                        <div class="text-xl font-bold" id="error-text"></div>
                    </div>
                    
                    <div id="success-results" class="flex flex-col items-center md:items-start gap-4 w-full">
                        <div class="badge-stamp">
                            <div class="text-[10px] mb-1 font-serif italic opacity-80 uppercase">Rating</div>
                            <div class="text-3xl font-bold tracking-widest" id="rating-val">0 / 10</div>
                        </div>
                        <div class="w-full">
                            <p class="text-[10px] uppercase font-mono text-[#C29958] mb-1">Complement:</p>
                            <p class="text-xl md:text-2xl font-serif italic leading-tight" id="compliment-text">"..."</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Canvas -->
    <canvas id="comp-canvas" class="hidden"></canvas>

    <script>
        const COMPLIMENTS = {
            male: {
                dark: ["Apnar chehara ekjon utkrishto maner niggar moto", "Nijer chobi upload diben, kalo kuttar na", "Apni mone hoi diddy vai er chele", "Ei chehara diye tur biye hobe na", "Ei chehara dekhle, apnar bow palai jabe"],
                fair: ["Apnar modde jonny vai ke tokkor dewar potential ache", "Ei chehara diye tur biye hobe na", "Apnar chehara ekjon shada niggar moto", "Nijer chobi upload diben, banorer na", "Ei chehara dekhle, apnar bow palai jabe"]
            },
            female: {
                dark: ["Apnar chehara dekhle manush voi pete pare", "Nijer chobi upload diben, chagoler na", "Nijer chobi upload diben, banorer na"],
                fair: ["Nijer chobi upload diben, banorer na", "Apu mone hoi onek beshi moida use koren", "Nijer chobi upload diben, chagoler na"]
            }
        };

        const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';
        const BACKUP_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        const elements = {
            fileInput: document.getElementById('file-input'),
            imagePreview: document.getElementById('image-preview'),
            placeholder: document.getElementById('image-placeholder'),
            loader: document.getElementById('loader-overlay'),
            analyzeBtn: document.getElementById('analyze-btn'),
            statusLed: document.getElementById('status-led'),
            statusText: document.getElementById('status-text'),
            resultsContainer: document.getElementById('results-container'),
            errorBadge: document.getElementById('error-badge'),
            errorText: document.getElementById('error-text'),
            successResults: document.getElementById('success-results'),
            ratingVal: document.getElementById('rating-val'),
            complimentText: document.getElementById('compliment-text'),
            canvas: document.getElementById('comp-canvas')
        };

        let modelsLoaded = false;
        let lastAnalyzedImage = null;
        let currentImageBase64 = null;

        // Initialize models
        async function init() {
            try {
                if (typeof faceapi === 'undefined') {
                   // Poll for faceapi if not immediately available
                   let attempts = 0;
                   while(typeof faceapi === 'undefined' && attempts < 10) {
                       await new Promise(r => setTimeout(r, 500));
                       attempts++;
                   }
                }
                
                const tryLoad = async (url) => {
                    await Promise.all([
                        faceapi.nets.tinyFaceDetector.loadFromUri(url),
                        faceapi.nets.ageGenderNet.loadFromUri(url),
                        faceapi.nets.faceLandmark68Net.loadFromUri(url),
                    ]);
                };

                try {
                    await tryLoad(MODEL_URL);
                } catch (e) {
                    await tryLoad(BACKUP_MODEL_URL);
                }

                modelsLoaded = true;
                elements.statusLed.classList.remove('waiting');
                elements.statusText.innerText = 'Neural Models Initialized';
                updateBtnState();
            } catch (err) {
                console.error(err);
                elements.statusText.innerText = 'Engine Failure. Please Refresh.';
            }
        }

        function updateBtnState() {
            elements.analyzeBtn.disabled = !modelsLoaded || !currentImageBase64;
        }

        elements.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    currentImageBase64 = reader.result;
                    elements.imagePreview.src = currentImageBase64;
                    elements.imagePreview.classList.remove('hidden');
                    elements.placeholder.classList.add('hidden');
                    elements.resultsContainer.classList.add('hidden');
                    updateBtnState();
                };
                reader.readAsDataURL(file);
            }
        });

        elements.analyzeBtn.addEventListener('click', async () => {
            if (!modelsLoaded || !currentImageBase64) return;

            if (currentImageBase64 === lastAnalyzedImage) {
                showError("Chobi arekta de");
                return;
            }

            elements.loader.classList.remove('hidden');
            elements.resultsContainer.classList.add('hidden');
            elements.analyzeBtn.disabled = true;

            try {
                const detections = await faceapi.detectAllFaces(
                    elements.imagePreview,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks().withAgeAndGender();

                if (detections.length === 0) {
                    showError("No face detected! Upload another");
                } else if (detections.length > 1) {
                    showError("Ettogula manush keno?");
                } else {
                    const face = detections[0];
                    const gender = face.gender;
                    const skinTone = getSkinTone(face.detection.box);
                    const rating = Math.floor(Math.random() * 3) + 4;
                    
                    const options = COMPLIMENTS[gender][skinTone];
                    const compliment = options[Math.floor(Math.random() * options.length)];

                    showResults(rating, compliment);
                    lastAnalyzedImage = currentImageBase64;
                }
            } catch (err) {
                console.error(err);
                showError("Ghotona thik na. Abar chesta kor.");
            } finally {
                elements.loader.classList.add('hidden');
                updateBtnState();
            }
        });

        function getSkinTone(box) {
            const ctx = elements.canvas.getContext('2d');
            elements.canvas.width = box.width;
            elements.canvas.height = box.height;
            
            ctx.drawImage(
                elements.imagePreview,
                box.x, box.y, box.width, box.height,
                0, 0, box.width, box.height
            );

            const data = ctx.getImageData(0, 0, box.width, box.height).data;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < data.length; i += 4) {
                r += data[i]; g += data[i+1]; b += data[i+2];
            }
            const count = data.length / 4;
            const lum = 0.299*(r/count) + 0.587*(g/count) + 0.114*(b/count);
            return lum < 120 ? 'dark' : 'fair';
        }

        function showError(msg) {
            elements.resultsContainer.classList.remove('hidden');
            elements.errorBadge.classList.remove('hidden');
            elements.successResults.classList.add('hidden');
            elements.errorText.innerText = msg;
        }

        function showResults(rating, compliment) {
            elements.resultsContainer.classList.remove('hidden');
            elements.errorBadge.classList.add('hidden');
            elements.successResults.classList.remove('hidden');
            elements.ratingVal.innerText = `${rating} / 10`;
            elements.complimentText.innerText = `"${compliment}"`;
        }

        init();
    </script>
</body>
</html>
